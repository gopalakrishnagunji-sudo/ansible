- name: Demo on filters
  hosts: local
  connection: local

  vars:
    topics: linux, ansible, docker, kubernetes, terraform
    course: "DevOps with Ansible"
    tagsMaps: #  tags is areserved word in ansible
      name: ansible
      project: roboshop
      component: catalogue
    tagsList:  [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]


  tasks:
    - name: Greeting
      ansible.builtin.debug:
        msg: "Hi Durga Gunji, {{ GREETING | default('Good Morning') }}"

    - name: convert string to list
      ansible.builtin.debug:
        msg: "{{ topics | split(',') }}"    

    - name: convert map to list
      ansible.builtin.debug:
        msg: "{{ tagsMaps | dict2items }}"

    - name: convert List to map
      ansible.builtin.debug:
        msg: "{{ tagsList | items2dict  }}"

    - name: read student yaml file
      ansible.builtin.set_fact: # setting the variable
        student_yaml: "{{ lookup('file', 'students.yaml') | from_yaml }}"

    - name: convert yaml to json
      ansible.builtin.debug:
        msg: "{{ student_yaml | to_nice_json }}"

    - name: convert to upper case
      ansible.builtin.debug:
        msg: "{{ course | upper }}"

    - name: convert to lower case
      ansible.builtin.debug:
        msg: "{{ course | lower }}"