- name: Demo on filters
  hosts: local
  connection: local

  vars:
    topics: linux, ansible, docker, kubernetes, terraform

    tagsList: #  tags is areserved word in ansible
      name: ansible
      project: roboshop
      component: catalogue

  tasks:
    - name: Greeting
      ansible.builtin.debug:
        msg: "Hi Durga Gunji, {{ GREETING | default('Good Morning') }}"

    - name: convert string to list
      ansible.builtin.debug:
        msg: "{{ topics | split(',') }}"    

    - name: convert map to list
      ansible.builtin.debug:
        msg: "{{ tagsList | dict2items }}"